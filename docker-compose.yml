services:
  chat_service:
    build:
      context: .
    ports:
      - 8000:8000
    volumes:
      - .:/app
    env_file:
      - .env
    image: chat_service
    container_name: chat_service_container
    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      - redis

  redis:
    restart: always
    image: redis/redis-stack
    ports:
      - 6379:6379
    container_name: redis_chat_container

  celery:
    restart: always
    build:
      context: .
    volumes:
      - .:/app
    container_name: celery_chat_container
    command: celery -A config worker -l INFO
    depends_on:
      - redis
      - chat_service
